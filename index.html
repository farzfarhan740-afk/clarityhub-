<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ClarityHub Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-top: 30px;
}

.input-box {
  display: flex;
  margin-top: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px 0 0 10px;
  border: none;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #00ffcc;
  font-weight: bold;
  border-radius: 0 10px 10px 0;
  cursor: pointer;
}

.card {
  margin-top: 30px;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
}

.thumbnail {
  width: 100%;
  border-radius: 10px;
}

.download-btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 15px;
  background: #00ffcc;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>🎬 ClarityHub Pro</h1>
  <p>Download Video HD dengan mudah 🔥</p>

  <div class="input-box">
    <input id="url" placeholder="Paste link video...">
    <button onclick="getVideo()">Proses</button>
  </div>

  <div id="result"></div>

</div>

<script>
async function getVideo() {
  let url = document.getElementById("url").value;

  if (!url) {
    alert("Masukkan link dulu!");
    return;
  }

  document.getElementById("result").innerHTML = "Loading...";

  try {
    let res = await fetch("https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://api.vevioz.com/api/button/mp4/" + url));

    let data = await res.text();

    document.getElementById("result").innerHTML =
      `<div class="card">
        <h3>Hasil Video</h3>
        ${data}
      </div>`;

  } catch (err) {
    document.getElementById("result").innerHTML = "Error ambil video!";
  }
}
</script>

</body>
</html>
