<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ClarityHub Pro</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
}

input {
  width: 60%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

.card {
  margin-top: 30px;
}

img {
  width: 300px;
  border-radius: 10px;
}

a {
  display: block;
  margin-top: 10px;
  color: #00ffcc;
}
</style>
</head>

<body>

<h1>🎬 ClarityHub Pro</h1>

<input id="url" placeholder="Paste link video...">
<button onclick="getVideo()">Proses</button>

<div id="result" class="card"></div>

<script>
async function getVideo() {
  let url = document.getElementById("url").value;

  if (!url) {
    alert("Masukkan link!");
    return;
  }

  document.getElementById("result").innerHTML = "Loading...";

  try {
    let res = await fetch("https://api.allorigins.win/raw?url=" +
      encodeURIComponent("https://api.vevioz.com/api/button/mp4/" + url));

    let data = await res.text();

    document.getElementById("result").innerHTML = data;

  } catch (err) {
    document.getElementById("result").innerHTML = "Gagal ambil video!";
  }
}
</script>

</body>
</html>
