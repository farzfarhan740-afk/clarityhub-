<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ClarityHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 text-white font-sans">

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center h-screen">
  <div class="bg-white/10 backdrop-blur p-6 rounded-2xl w-80 shadow-xl">

    <h1 class="text-2xl font-bold text-center mb-4">🚀 ClarityHub</h1>

    <input id="user" placeholder="Username"
      class="w-full p-2 mb-3 rounded bg-white/20 text-white placeholder-gray-200 border border-white/30">

    <input id="pass" type="password" placeholder="Password"
      class="w-full p-2 mb-3 rounded bg-white/20 text-white placeholder-gray-200 border border-white/30">

    <button onclick="login()"
      class="w-full bg-white text-blue-700 py-2 rounded font-semibold hover:opacity-80">
      Login
    </button>

    <p id="error" class="text-red-300 text-sm mt-2 text-center"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="appPage" class="hidden">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-4 bg-black/20 backdrop-blur">
    <h1 class="font-bold text-lg">🚀 ClarityHub</h1>
    <button onclick="logout()" class="text-sm text-red-200">Logout</button>
  </nav>

  <!-- Content -->
  <div class="p-6 flex justify-center">
    <div class="w-full max-w-md bg-white/10 backdrop-blur p-6 rounded-2xl shadow-xl text-center">

      <h2 class="text-xl font-semibold mb-4">AI Video Enhancer</h2>

      <input type="file" id="videoInput" accept="video/*"
        class="mb-4 w-full text-sm text-white">

      <video id="preview" controls class="hidden w-full rounded mb-3"></video>

      <button onclick="previewVideo()"
        class="w-full bg-white text-blue-700 py-2 rounded mb-2 font-semibold hover:opacity-80">
        Preview Video
      </button>

      <button onclick="processVideo()"
        class="w-full bg-blue-800 py-2 rounded font-semibold hover:opacity-80">
        AI Boost HD
      </button>

      <!-- Loading -->
      <div id="loading" class="hidden text-yellow-200 mt-3">
        ⏳ Processing...
      </div>

      <!-- Download -->
      <a id="downloadBtn"
        class="hidden block mt-3 bg-green-400 text-black py-2 rounded font-semibold hover:opacity-80">
        ⬇️ Download Video
      </a>

      <p id="status" class="mt-2 text-green-200"></p>

    </div>
  </div>

</div>

<script>
let videoURL = "";

// LOGIN
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "123") {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
  } else {
    document.getElementById("error").innerText = "Login salah";
  }
}

// LOGOUT
function logout() {
  document.getElementById("appPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

// PREVIEW
function previewVideo() {
  const file = document.getElementById('videoInput').files[0];
  const video = document.getElementById('preview');

  if (file) {
    videoURL = URL.createObjectURL(file);
    video.src = videoURL;
    video.classList.remove("hidden");
  }
}

// PROCESS (DEMO)
function processVideo() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("status").innerText = "";
  document.getElementById("downloadBtn").classList.add("hidden");

  setTimeout(() => {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("status").innerText = "✅ Selesai (demo)";

    const download = document.getElementById("downloadBtn");
    download.href = videoURL;
    download.download = "clarityhub-video.mp4";
    download.classList.remove("hidden");

  }, 2000);
}
</script>

</body>
    </html>.
