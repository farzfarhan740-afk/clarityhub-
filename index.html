<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarityHub Video</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

input {
    width: 80%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    color: black;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

video {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 10px;
}

.download-btn {
    display: none;
    margin-top: 10px;
    background: #00ffcc;
}
</style>

</head>
<body>

<div class="container">
    <h2>ClarityHub Video Downloader</h2>

    <input type="text" id="videoUrl" placeholder="Masukkan link video...">
    <br>
    <button onclick="loadVideo()">Preview Video</button>

    <br>
    <video id="videoPlayer" controls></video>

    <br>
    <a id="downloadBtn" class="download-btn" download>
        <button>Download HD</button>
    </a>
</div>

<script>
function loadVideo() {
    let url = document.getElementById("videoUrl").value;
    let video = document.getElementById("videoPlayer");
    let download = document.getElementById("downloadBtn");

    if (url === "") {
        alert("Masukkan link video dulu!");
        return;
    }

    video.src = url;
    download.href = url;
    download.style.display = "inline-block";
}
</script>

</body>
</html>
