<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarityHub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #111;
  border-bottom: 1px solid #222;
}

.container {
  max-width: 500px;
  margin: 30px auto;
  padding: 20px;
  background: #111;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  font-size: 14px;
  color: black;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00ffcc;
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.8;
}

video {
  width: 100%;
  border-radius: 10px;
  margin-top: 15px;
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<header>ClarityHub</header>

<div class="container">
  <input type="text" id="videoUrl" placeholder="Masukkan link atau upload video...">

  <button onclick="previewVideo()">Preview Video</button>

  <video id="videoPlayer" controls></video>

  <button onclick="downloadHD()">Download HD</button>
</div>

<div class="footer">
  ClarityHub © 2026
</div>

<script>
function previewVideo() {
  const url = document.getElementById("videoUrl").value;
  const video = document.getElementById("videoPlayer");

  if (url) {
    video.src = url;
  } else {
    alert("Masukkan link video dulu!");
  }
}

function downloadHD() {
  const url = document.getElementById("videoUrl").value;

  if (!url) {
    alert("Masukkan video dulu!");
    return;
  }

  // GANTI dengan backend kamu nanti
  fetch("https://backend-kamu.up.railway.app/convert", {
    method: "POST"
  })
  .then(res => res.blob())
  .then(data => {
    const link = document.createElement("a");
    link.href = URL.createObjectURL(data);
    link.download = "video_hd.mp4";
    link.click();
  })
  .catch(() => {
    alert("Backend belum terhubung!");
  });
}
</script>

</body>
</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarityHub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #111;
}

.container {
  max-width: 500px;
  margin: 30px auto;
  padding: 20px;
  background: #111;
  border-radius: 15px;
}

input[type="file"] {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #00ffcc;
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

video {
  width: 100%;
  margin-top: 15px;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>ClarityHub</header>

<div class="container">

  <input type="file" id="uploadVideo" accept="video/*">

  <button onclick="previewVideo()">Preview Video</button>

  <video id="videoPlayer" controls></video>

  <button onclick="downloadHD()">Convert ke HD</button>

</div>

<script>
let selectedFile;

function previewVideo() {
  const fileInput = document.getElementById("uploadVideo");
  const video = document.getElementById("videoPlayer");

  selectedFile = fileInput.files[0];

  if (!selectedFile) {
    alert("Upload video dulu!");
    return;
  }

  const url = URL.createObjectURL(selectedFile);
  video.src = url;
}

function downloadHD() {
  if (!selectedFile) {
    alert("Upload video dulu!");
    return;
  }

  const formData = new FormData();
  formData.append("video", selectedFile);

  fetch("https://backend-kamu.up.railway.app/convert", {
    method: "POST",
    body: formData
  })
  .then(res => res.blob())
  .then(data => {
    const link = document.createElement("a");
    link.href = URL.createObjectURL(data);
    link.download = "video_hd.mp4";
    link.click();
  })
  .catch(() => {
    alert("Backend belum aktif!");
  });
}
</script>

</body>
</html>
