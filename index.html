<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ClarityHub</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🚀 ClarityHub</h1>
  <div class="box">
    <p>Upload video kamu:</p>
    <input type="file">
    <br>
    <button>Convert ke HD</button>
  </div>
</body>
</html>
